name: Build Fabric 

on:
  workflow_dispatch:
  push:
    branches: [main, 26.1, neoforge]

jobs:
  debug_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew buildAndCollect+All || ./gradlew buildAndCollect || ./gradlew build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GPR_KEY: ${{ secrets.GPR_KEY }}
          ORG_GRADLE_PROJECT_gpr.user: ${{ github.actor }}
          ORG_GRADLE_PROJECT_gpr.key: ${{ secrets.GPR_KEY }}

      - name: List all files (Debug)
        run: |
          echo "Listing all .jar files in the project:"
          find . -name "*.jar"

      - name: Capture ALL .jar files
        uses: actions/upload-artifact@v4
        with:
          name: All-Jars-Found
          path: "**/*.jar"
