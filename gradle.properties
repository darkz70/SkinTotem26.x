# # # # # # # # # # # # # #
#    Project Properties   #
# # # # # # # # # # # # # #

# Gradle Settings
org.gradle.jvmargs=-Xmx24G
org.gradle.parallel=true

# FeatherPlugin
feather_plugin_version = 1.1.0

# Data Properties
data.mod_id = skintotem
data.mod_name = SkinTotem
data.mod_version = 1.1.0
data.mod_group = com.darkz.skintotem
data.mod_maven_group = com.darkz
data.mixin_configs = modmenu sodium yacl
data.sides = client

data.mod_description = Replaces regular totems with autogenerated 2D or 3D totems for EVERY player in Minecraft! Rename your totem to player's nickname to use its skin.
data.mod_authors = Darkz, LopyMine, KlashRaick 
data.github_mod_author = darkz70
data.mod_license = CC-BY-ND 4.0

# Base Properties
base.lombok_version = 1.18.44
base.mixinextras_version = 0.4.1
base.mixin_version = 0.8.5

# Per-Loader Versions
fabric.multi_versions=26.1 26.1.1 26.1.2
neoforge.multi_versions=26.1 26.1.1 26.1.2

# Mod Loaders
mod_loaders = fabric neoforge

# Build Properties
build.fabric_loader = 0.18.4
build.fabric_api = [VERSIONED]
build.neoforge = [VERSIONED]
build.forge = [VERSIONED]
build.mixin_squared = 0.2.0

# Additional Dependencies, "dep." is important
dep.yacl = [VERSIONED]
dep.modmenu = [VERSIONED]
dep.cit-resewn = [VERSIONED]
dep.ears = [VERSIONED]
dep.sodium = [VERSIONED]

# # # # # # # # # # # # # #
#  Publication Properties #
# # # # # # # # # # # # # #

# Supported Versions, 1.21[1] -> 1.21-1.21.1
fabric.versions_specifications = 1.21.10
neoforge.versions_specifications = 1.21.10

# Version Type [RELEASE, BETA, ALPHA]
version_type = RELEASE

# Imitation of Publishing. Set to "true" for testing
test_publish = false

# Project IDs
modrinth_id = ygYU16dG
curseforge_id = 1065783

# CurseForge Settings
is_for_client = true
is_for_server = false
max_java_version = 25

# Fabric Dependencies
fabric.depends_requires = fabric-api
fabric.depends_optional = modmenu yacl
fabric.depends_incompatible = none
fabric.depends_embeds  = none

# NeoForge Dependencies
neoforge.depends_requires = none
neoforge.depends_optional = yacl
neoforge.depends_incompatible = none
neoforge.depends_embeds  = none

# Stonecutter Stuff
dev.kikugie.stonecutter.hard_mode=true
