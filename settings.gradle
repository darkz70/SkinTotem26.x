pluginManagement {
    repositories {
        maven { url "https://maven.fabricmc.net/" }
        maven { url "https://maven.kikugie.dev/snapshots" }
        maven { url "https://maven.kikugie.dev/releases" }
        maven { url "https://maven.neoforged.net/releases" }
        // FeatherPlugin с GitHub Packages
        maven {
            url "https://maven.pkg.github.com/darkz70/FeatherPlugin"
            credentials {
                username = System.getenv("GITHUB_ACTOR") ?: providers.gradleProperty("gpr.user").orNull ?: ""
                password = System.getenv("GITHUB_TOKEN") ?: providers.gradleProperty("gpr.key").orNull ?: ""
            }
        }
        mavenLocal()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.kikugie.stonecutter" version "0.9"
    id "net.darkz.feather.feather-settings" version "1.0.0"
}

featherVersions {
    version("26.1",   "fabric", "neoforge")
    version("26.1.1", "fabric", "neoforge")
    version("26.1.2", "fabric", "neoforge")
}

stonecutter {
    centralScript = "build.gradle"
    kotlinController = false
    create rootProject
}
