pluginManagement {
    repositories {
        maven {
            name "Fabric"
            url "https://maven.fabricmc.net/"
        }
        maven {
            name "Kiku Snapshots"
            url "https://maven.kikugie.dev/snapshots"
        }
        maven {
            name "Kiku Releases"
            url "https://maven.kikugie.dev/releases"
        }
        maven {
            name "NeoForged"
            url "https://maven.neoforged.net/releases"
        }
        maven {
            name "GitHub Packages - FeatherPlugin"
            url "https://maven.pkg.github.com/darkz70/FeatherPlugin"
            credentials {
                username = System.getenv("GITHUB_ACTOR") ?: ""
                password = System.getenv("GITHUB_TOKEN") ?: ""
            }
        }
        mavenLocal()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.kikugie.stonecutter" version "0.9"
    id "net.darkz.feather.settings" version "1.0.0"
}
