pluginManagement {
	repositories {
		maven {
			name "Fabric"
			url "https://maven.fabricmc.net/"
		}
		maven {
			name "Kiku Snapshots"
			url "https://maven.kikugie.dev/snapshots"
		}
		maven {
			name "Kiku Releases"
			url "https://maven.kikugie.dev/releases"
		}
		maven {
			name "Mossy Projects"
			url "https://maven.lopymine.net/releases"
		}
		mavenLocal()
		mavenCentral()
		gradlePluginPortal()
		maven {
			name = "Feather"
			url = "https://maven.pkg.github.com/darkz70/FeatherPlugin"
			credentials {
				username = System.getenv("GITHUB_ACTOR") ?: "token"
				password = System.getenv("GITHUB_TOKEN") ?: ""
			}
		}
	}
}

plugins {
	id "dev.kikugie.stonecutter" version "0.9"
	id "net.lopymine.mossy-plugin-settings" version "3.2.0"
}
