pluginManagement {
    repositories {
        maven {
            name "Fabric"
            url "https://maven.fabricmc.net/"
        }
        maven {
            name "Kiku Snapshots"
            url "https://maven.kikugie.dev/snapshots"
        }
        maven {
            name "Kiku Releases"
            url "https://maven.kikugie.dev/releases"
        }
        maven {
            name "Mossy Projects"
