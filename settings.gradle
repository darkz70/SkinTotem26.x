pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenLocal()
        maven { url "https://maven.fabricmc.net/" }
        maven { url "https://maven.neoforged.net/releases/" }
        maven { url "https://maven.kikugie.dev/releases" }
        maven {
            name "FeatherPlugin"
            url "https://maven.pkg.github.com/darkz70/FeatherPlugin"
            credentials {
                username = System.getenv("GITHUB_ACTOR") ?: "darkz70"
                password = System.getenv("GITHUB_TOKEN") ?: ""
            }
        }
    }
}

plugins {
    id 'dev.kikugie.stonecutter' version '0.9'
    id 'net.darkz.feather.feather-settings' version '1.1.0'
}

featherVersions {
    version("26.1", "fabric", "neoforge")
    version("26.1.1", "fabric", "neoforge")
    version("26.1.2", "fabric", "neoforge")
}

stonecutter {
    centralScript = "build.gradle"
}
