modLoader="javafml"
loaderVersion="[4,)"
license="${mod_license}"

[[mixins]]
    config="${mod_id}.mixins.json"

[[mixins]]
    config="${mod_id}-yacl.mixins.json"

[[mixins]]
    config="${mod_id}-sodium.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neoforge_version},)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="[${minecraft_version},)"
    ordering="NONE"
    side="CLIENT"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    description="${mod_description}"
    logoFile="icon/icon.png"

    [[mods.${mod_id}.authors]]
        name="Darkz"
    [[mods.${mod_id}.authors]]
        name="LopyMine"
    [[mods.${mod_id}.authors]]
        name="KlashRaick"
